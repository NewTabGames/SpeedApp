name: SpeedApp
options:
  bundleIdPrefix: com.tyler.speedapp
  deploymentTarget:
    iOS: "17.0"

targets:
  SpeedApp:
    type: application
    platform: iOS
    sources:
      - Sources/SpeedApp
    info:
      path: Sources/SpeedApp/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: "MPH Tracker"
        NSLocationWhenInUseUsageDescription: "SpeedApp uses your location to measure your current speed in MPH."
        NSLocationAlwaysAndWhenInUseUsageDescription: "SpeedApp uses your location to measure your current speed in MPH."
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyler.speedapp
        PRODUCT_NAME: SpeedApp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: false
        CODE_SIGNING_ALLOWED: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
