name: SpeedApp
options:
  bundleIdPrefix: com.tyler.speedapp
  deploymentTarget:
    iOS: "18.0"

targets:
  SpeedApp:
    type: application
    platform: iOS
    sources:
      - Sources/SpeedApp
    info:
      path: Sources/SpeedApp/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: "Epstein's GPS"
        UIBackgroundModes:
          - location
        NSLocationWhenInUseUsageDescription: "Used to measure your speed and record your ride."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Lets the app keep recording your speed, distance, and route while your phone is locked or in your pocket."
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tyler.speedapp
        PRODUCT_NAME: SpeedApp
        MARKETING_VERSION: "2.1"
        CURRENT_PROJECT_VERSION: "3"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: false
        CODE_SIGNING_ALLOWED: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
